<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spectrum Public Access</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sixtyfour&family=VT323&family=Space+Grotesk:wght@400;500;700&display=swap');

/* The logo's real typeface. Shows if installed on the viewer's machine;
   upload the .ttf and it can be embedded here so it works for everyone. */
@font-face{
  font-family:'Alarm Clock';
  src:local('Alarm Clock'), local('alarm clock'), local('AlarmClock');
}

:root{
  --logo-yellow:#ffee3c;   /* 255,238,60 — SPA logo yellow */
  --fishy-cyan:#3dd9ff;    /* 61,217,255 — Feeling Fishy title glow */
  --cg-white:#ede9df;
}

*{box-sizing:border-box;}
/* Background lives on body ONLY, and body must stay a full-width block —
   putting display:flex on <html> makes <body> shrink-wrap its content,
   which painted the gradient in a centered column (the "box"). */
html{ margin:0; padding:0; }
body{
  margin:0; min-height:100vh;
  background:
    radial-gradient(ellipse at 50% -10%, #2a3550 0%, #0c0f18 60%, #050609 100%);
  font-family:'Space Grotesk',sans-serif;
  color:var(--cg-white);
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  overflow-x:hidden;
}

/* faint full-page scanlines + vignette so the whole page feels like a broadcast */
body:before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
  background:repeating-linear-gradient(
    to bottom, rgba(0,0,0,.14) 0px, rgba(0,0,0,.14) 1px,
    transparent 2px, transparent 4px);
}
body:after{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:5;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,.55) 100%);
}

.stage{
  display:flex; flex-direction:column; align-items:center; gap:56px;
  width:100%;
}

/* ---------- NEON LOGO ----------
   The glow is baked into the PNG itself (soft yellow halo pre-rendered
   around the letters, fading to fully transparent) — no CSS drop-shadow.
   CSS glow filters were clipping at the image rectangle and drawing a
   visible box behind the logo; a baked glow blends seamlessly. */
.logo{
  width:min(880px, 94vw); /* canvas includes glow padding; letters read ~same size as before */
  height:auto;
  animation:
    neonOn 2s steps(1,end) both,
    neonBreathe 6s ease-in-out 2s infinite;
}

/* neon tube striking on: dead → sputter → hold */
@keyframes neonOn{
  0%,14%{ opacity:0; }
  16%  { opacity:.55; }
  21%  { opacity:.08; }
  27%  { opacity:.75; }
  32%  { opacity:.15; }
  36%  { opacity:.9; }
  41%  { opacity:.4; }
  46%,100% { opacity:1; }
}

/* settled tube hum */
@keyframes neonBreathe{
  0%,100%{ opacity:1; }
  50%{ opacity:.9; }
}

/* ---------- THE TWO OPTIONS ---------- */
.options{
  display:flex; gap:36px; flex-wrap:wrap; justify-content:center;
}

.opt{
  font-family:'Alarm Clock','Sixtyfour',monospace;
  font-size:clamp(14px, 2.4vw, 21px);
  letter-spacing:.08em;
  text-transform:uppercase;
  text-decoration:none;
  padding:20px 30px;
  border:2px solid currentColor;
  border-radius:14px;
  opacity:0;
  transition:transform .12s ease;
}
.opt:active{ transform:scale(.97); }
.opt:focus-visible{ outline:3px solid var(--cg-white); outline-offset:4px; }

.opt.stream{
  color:var(--logo-yellow);
  text-shadow:0 0 6px rgba(255,238,60,.7), 0 0 20px rgba(255,238,60,.3);
  box-shadow:0 0 14px rgba(255,238,60,.25), inset 0 0 14px rgba(255,238,60,.15);
  animation:optOn .7s steps(1,end) 2.15s forwards;
}
.opt.fishy{
  color:var(--fishy-cyan);
  text-shadow:0 0 6px rgba(61,217,255,.7), 0 0 20px rgba(61,217,255,.3);
  box-shadow:0 0 14px rgba(61,217,255,.25), inset 0 0 14px rgba(61,217,255,.15);
  animation:optOn .7s steps(1,end) 2.45s forwards;
}

@keyframes optOn{
  0%{opacity:0;} 20%{opacity:.6;} 35%{opacity:.1;} 55%{opacity:.8;} 70%{opacity:.3;} 100%{opacity:1;}
}

.opt.stream:hover{
  text-shadow:0 0 8px rgba(255,238,60,.95), 0 0 30px rgba(255,238,60,.5);
  box-shadow:0 0 26px rgba(255,238,60,.45), inset 0 0 20px rgba(255,238,60,.25);
}
.opt.fishy:hover{
  text-shadow:0 0 8px rgba(61,217,255,.95), 0 0 30px rgba(61,217,255,.5);
  box-shadow:0 0 26px rgba(61,217,255,.45), inset 0 0 20px rgba(61,217,255,.25);
}

/* reduced motion: no flicker, everything simply on */
@media (prefers-reduced-motion: reduce){
  .logo{ animation:none; opacity:1; }
  .opt{ animation:none !important; opacity:1 !important; }
}
</style>
</head>
<body>

<main class="stage">
  <img class="logo" src="images/logo.png" alt="Spectrum Public Access">

  <!-- WATCH THE STREAM is intentionally unlinked for now — add an href
       here once that page/stream exists. FEELING FISHY points at the
       Feeling Fishy build, deployed at /feeling-fishy. -->
  <nav class="options" aria-label="Choose an experience">
    <a class="opt stream">WATCH THE STREAM</a>
    <a class="opt fishy" href="/feeling-fishy">FEELING FISHY</a>
  </nav>
</main>

</body>
</html>
