body.calm .school-dots { opacity: 0; translate: -50% 16px; pointer-events: none; }
body.calm .school-arrow, body.calm .school-dots {
  transition: opacity 1.6s ease, translate 1.6s ease;
}

/* Plain stand-in shown until your real image loads */
.placeholder {
  background: rgba(255,255,255,0.25);
  border: 2px dashed rgba(255,255,255,0.6);
  border-radius: 12px;
  aspect-ratio: 3 / 2;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  text-align: center;
  padding: 6px;
}

@media (prefers-reduced-motion: reduce) {
  .decoration.sways, .fish:hover .wiggle,
  .bubble, .ray,
  .flight-wiggle,
  body.feeding .fish .wiggle,
  .card.reveal h2, .card.reveal p, .card.reveal button { animation: none; }
  .bubble, .pellet { display: none; }
  .flight { transition: none; }
  .thought { transition: opacity 0.2s ease; transform: none; }
  .fish:hover .thought { transition-delay: 3s; }
}
</style>
</head>
<body>

<div id="tank"></div>

<header>
  <h1>Feeling Fishy</h1>
  <p id="tagline">Drag to spin the tank. Hover a fish to meet its creator.</p>
</header>

<!-- Info / Feed / Sound / Language buttons all live here so they lay
     out automatically as a row — no manual pixel math needed even
     though "Feed the Fish" changes width between languages. Visual
     order is controlled by the `order` CSS property on each button,
     not by the order they're added in JS. -->
<div class="top-controls" id="topControls"></div>

<div class="card-overlay" id="cardOverlay">
  <div class="card">
    <div id="cardArt"></div>
    <h2 id="cardName"></h2>
    <p id="cardCreator"></p>
    <p class="bio" id="cardBio"></p>
    <button id="cardBack" onclick="closeCard()">Back to the tank</button>
  </div>
</div>

<!-- The "Create your fish" pop-up: download the template, or
     submit a finished fish through the monday.com form -->
<div class="card-overlay" id="createOverlay">
  <div class="card">
    <h2 id="createTitle"></h2>
    <div class="option-row">
      <a class="option-btn" id="optDownload"><span class="inlay" id="optDownloadLabel"></span></a>
      <a class="option-btn" id="optSubmit"><span class="inlay" id="optSubmitLabel"></span></a>
    </div>
    <button id="createClose" onclick="closeCreate()">Close</button>
  </div>
</div>

<!-- Second level of the create menu: choose a template format -->
<div class="card-overlay" id="downloadOverlay">
  <div class="card">

      <a class="option-btn" id="dlPng"><span class="inlay" id="dlPngLabel"></span></a>
      <a class="option-btn" id="dlPsd" target="_blank" rel="noopener"><span class="inlay" id="dlPsdLabel"></span></a>
      <a class="option-btn" id="dlKrita" target="_blank" rel="noopener"><span class="inlay" id="dlKritaLabel"></span></a>

<!-- "Submit your fish" pop-up: the monday.com form loads inline in

     until someone actually asks for it. -->
<div class="card-overlay" id="submitOverlay" role="dialog" aria-modal="true" aria-labelledby="submitTitle">
  <div class="card submit-card">
    <h2 id="submitTitle"></h2>
    <div class="iframe-wrap">
      <iframe id="submitFrame"></iframe>
    </div>
    <button id="submitBack">Back</button>
  </div>
</div>

<!-- "About this project" info pop-up: a short project blurb plus a
     plain-language walkthrough of what everything on the page does. -->
<div class="card-overlay" id="infoOverlay" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
  <div class="card info-card">
    <h2 id="infoTitle"></h2>
    <p id="infoIntro"></p>
    <h3 id="howToTitle"></h3>
    <ol id="howToList"></ol>
    <button id="infoClose"></button>
  </div>
</div>

<script>
/* ==============================================================
   THE AQUARIUM ENGINE — runs everything using your data above.
   ============================================================== */
const tank = document.getElementById("tank");
if (SETTINGS.background) tank.style.backgroundImage = `url(${SETTINGS.background})`;

// Looping video backdrop (e.g. rendered from your Unreal scene).
// muted + playsinline are required for browsers to autoplay it.
if (SETTINGS.backgroundVideo) {
  const vid = document.createElement("video");
  vid.src = SETTINGS.backgroundVideo;
  vid.autoplay = true;
  vid.loop = true;
  vid.muted = true;
  vid.playsInline = true;
  vid.setAttribute("style",
    "position:absolute; inset:0; width:100%; height:100%; " +
    "object-fit:cover; z-index:0; pointer-events:none;");
  tank.prepend(vid);

  // Optional dark veil over the video so the fish stand out
  if (SETTINGS.videoDimmer > 0) {
    const veil = document.createElement("div");
    veil.setAttribute("style",
      "position:absolute; inset:0; background:black; z-index:1; " +
      "pointer-events:none; opacity:" + SETTINGS.videoDimmer + ";");
    tank.appendChild(veil);
  }
}

// Helper: re-map a number from one range to another.
function mapRange(value, inMin, inMax, outMin, outMax) {
  return outMin + (value - inMin) / (inMax - inMin) * (outMax - outMin);
}

// Plain placeholder for images that haven't been added yet
function placeholderFor(path) {
  const ph = document.createElement("div");
  ph.className = "placeholder";
  ph.textContent = path;
  return ph;
}

/* --- Water effects: bubbles, rays, ripple ----------------------
   The ripple works with an SVG "displacement map": an invisible
   layer of animated noise pushes every pixel of the tank around
   slightly, like light bending through moving water. ----------- */
const stillMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

if (WATER.bubbles > 0) {
  for (let i = 0; i < WATER.bubbles; i++) {
    const b = document.createElement("div");
    b.className = "bubble";
    const size = 5 + Math.random() * 16;              // 5–21 px wide
    b.style.width = b.style.height = size + "px";
    b.style.left = Math.random() * 100 + "%";
    b.style.setProperty("--sway", (4 + Math.random() * 14) + "px");
    b.style.animationDuration = (7 + Math.random() * 9) + "s";
    b.style.animationDelay = (Math.random() * -16) + "s"; // already mid-rise
    // Some bubbles drift behind the fish, some in front — adds depth
    b.style.zIndex = Math.random() < 0.6 ? 5 : 320;
    tank.appendChild(b);
  }
}

if (WATER.rays) {
  [{ left: "12%", delay: "0s" }, { left: "38%", delay: "2s" },
   { left: "67%", delay: "4s" }].forEach((r) => {
    const ray = document.createElement("div");
    ray.className = "ray";
    ray.style.left = r.left;
    ray.style.animationDelay = r.delay;
    tank.appendChild(ray);
  });
}

if (WATER.ripple && !stillMotion) {
  const svg = document.createElement("div");
  svg.innerHTML = `
    <svg width="0" height="0" style="position:absolute">
      <filter id="ripple" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.016"
                      numOctaves="1" seed="3" result="noise">
          <animate attributeName="baseFrequency" dur="16s"
                   values="0.008 0.016; 0.011 0.021; 0.008 0.016"
                   repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise"
                           scale="${WATER.rippleStrength}"/>
      </filter>
    </svg>`;
  document.body.appendChild(svg);
  // The distortion pushes pixels past the screen edge, so the tank
  // is stretched slightly beyond the viewport to hide the seams.
  tank.style.inset = "-16px";
  tank.style.filter = "url(#ripple)";
}

/* --- The chime engine (Web Audio) -------------------------------
   Every fish plays the SAME xylophone sample, but pitched to its
   own step of a major pentatonic scale — a scale where every note
   is consonant with every other. Hover several fish quickly and
   the overlapping notes stack into chords instead of clashing.

   The reverb is a convolver fed a generated "impulse response"
   (2.8 seconds of decaying noise = a big virtual room), and the
   reverb path runs through a lowpass filter first, which darkens
   the echoes — big, but deep underwater. ------------------------ */

// Two octaves of major pentatonic (in semitones above the sample)
const CHIME_SCALE = [0, 2, 4, 7, 9, 12, 14, 16, 19, 21];

let audioCtx = null, chimeBuffer = null, chimeLoading = false;
let chimeDry = null, chimeWetIn = null;

function initChimeEngine() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Dry path: the note, straight to the speakers
  chimeDry = audioCtx.createGain();
  chimeDry.gain.value = 0.7;
  chimeDry.connect(audioCtx.destination);

  // Wet path: lowpass (darkens it) -> reverb -> speakers
  const lowpass = audioCtx.createBiquadFilter();
  lowpass.type = "lowpass";
  lowpass.frequency.value = 1600;   // lower = murkier water

  const reverb = audioCtx.createConvolver();
  const rate = audioCtx.sampleRate;
  const seconds = 2.8;              // reverb tail length
  const impulse = audioCtx.createBuffer(2, rate * seconds, rate);
  for (let ch = 0; ch < 2; ch++) {
    const d = impulse.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.5);
    }
  }
  reverb.buffer = impulse;

  const wet = audioCtx.createGain();
  wet.gain.value = 0.55;            // how much reverb in the mix

  lowpass.connect(reverb);
  reverb.connect(wet);
  wet.connect(audioCtx.destination);
  chimeWetIn = lowpass;
}

async function loadChime(src) {
  if (chimeBuffer || chimeLoading) return;
  chimeLoading = true;
  try {
    const res = await fetch(src);
    chimeBuffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
  } catch (e) { chimeLoading = false; }
}

function playChime(src, semitones) {
  if (!soundOn) return;
  initChimeEngine();
  if (audioCtx.state === "suspended") audioCtx.resume();
  if (!chimeBuffer) {
    // First hover: decode the sample, then ring the note
    loadChime(src).then(() => {
      if (chimeBuffer && soundOn) playChime(src, semitones);
    });
    return;
  }
  const note = audioCtx.createBufferSource();
  note.buffer = chimeBuffer;
  // Each semitone up multiplies the speed by 2^(1/12)
  note.playbackRate.value = Math.pow(2, semitones / 12);
  const g = audioCtx.createGain();
  g.gain.value = 0.25;
  note.connect(g);
  g.connect(chimeDry);     // direct sound
  g.connect(chimeWetIn);   // and into the underwater reverb
  note.start();
}

/* --- Build the fish ------------------------------------------- */
const swimmers = FISH.map((fish, i) => {
  const el = document.createElement("div");
  el.className = "fish";

  const img = document.createElement("img");
  img.src = fish.image;
  img.alt = `${fish.name} by ${fish.creator}`;
  img.onerror = () => img.replaceWith(placeholderFor(fish.image));

  const wiggle = document.createElement("div");
  wiggle.className = "wiggle";
  wiggle.appendChild(img);

  // The flip wrapper mirrors only the artwork when the fish swims
  // the other way — the name tag and thought bubble stay readable
  const flip = document.createElement("div");
  flip.appendChild(wiggle);

  const tag = document.createElement("span");
  tag.className = "name-tag";
  tag.textContent = "by " + fish.creator;

  el.append(flip, tag);

  // Each fish gets one of three hover personalities at random
  el.classList.add("anim" + Math.floor(Math.random() * 3));

  // Thought bubble with the creator's bio, if they shared one
  if (fish.bio) {
    const thought = document.createElement("div");
    thought.className = "thought";
    thought.textContent = fish.bio;
    el.appendChild(thought);
  }

  el.addEventListener("click", () => { if (!wasDragged) openCard(i); });

  // Per-fish chime: same sample, but pitched to this fish's own
  // step of the pentatonic scale (see the chime engine above), so
  // sweeping across the school plays a melody, and overlaps chord.
  if (fish.sound) {
    const semitones = CHIME_SCALE[i % CHIME_SCALE.length];
    el.addEventListener("pointerenter", () => playChime(fish.sound, semitones));
  }

  // Hovered fish come forward: the orbit loop enlarges them and
  // lifts them above their neighbours (see the animate function)
  const state = {
    el,
    flipEl: flip,
    hovered: false,
    flipped: false,
    size: fish.size || 120,
    // Spread around the carousel WITHIN this fish's school
    angle: ((i % SCHOOL_SIZE) /
      Math.min(SCHOOL_SIZE, FISH.length - Math.floor(i / SCHOOL_SIZE) * SCHOOL_SIZE))
      * Math.PI * 2,
    active: true,
    // Each fish orbits at a slightly different distance (85%–115%
    // of the base radius) so a big school doesn't look like a ring
    radiusJitter: 0.85 + Math.random() * 0.3,
    height: fish.height ?? mapRange(i % 3, 0, 2, 25, 60),
    bobOffset: Math.random() * Math.PI * 2,
  };
  el.addEventListener("pointerenter", () => { state.hovered = true; });
  el.addEventListener("pointerleave", () => { state.hovered = false; });

  tank.appendChild(el);
  return state;
});

/* --- Build the decorations ------------------------------------ */
DECORATIONS.forEach((deco) => {
  const el = document.createElement("div");
  el.className = "decoration" + (deco.sway ? " sways" : "");
  el.style.left = deco.x + "%";
  el.style.height = deco.height + "px";
  el.style.animationDelay = (Math.random() * -4) + "s";

  const img = document.createElement("img");
  img.src = deco.image;
  img.alt = "";
  img.onerror = () => {
    const ph = placeholderFor(deco.image);
    ph.style.height = "100%";
    img.replaceWith(ph);
  };
  el.appendChild(img);
  tank.appendChild(el);
});

/* --- Schools ------------------------------------------------------
   The FISH list is split into schools of SCHOOL_SIZE. Only one
   school swims at a time; the arrows (or dots) change schools with
   a swim-through: the current school darts off in the direction of
   travel, and the next glides in from the other side. ------------- */
const schoolCount = Math.ceil(FISH.length / SCHOOL_SIZE);
let schoolIndex = 0;
let schoolOffset = 0;     // px added to every fish's x during transit
let schoolAnim = null;    // { phase: "out"|"in", dir, next, start }
let schoolDots = null;

function setSchoolVisibility() {
  swimmers.forEach((f, i) => {
    f.active = Math.floor(i / SCHOOL_SIZE) === schoolIndex;
    f.el.style.display = f.active ? "" : "none";
  });
}

function updateDots() {
  if (!schoolDots) return;
  [...schoolDots.children].forEach((dot, i) =>
    dot.classList.toggle("active", i === schoolIndex));
}

function changeSchool(dir) {
  if (schoolAnim || schoolCount < 2) return;
  const next = (schoolIndex + dir + schoolCount) % schoolCount;
  if (stillMotion) {              // reduced motion: instant swap
    schoolIndex = next;
    setSchoolVisibility();
    updateDots();
    return;
  }
  schoolAnim = { phase: "out", dir, next, start: performance.now() };
  // A little chime marks the change: a fifth up going forward,
  // back to the root coming back
  const withSound = FISH.find((f) => f.sound);
  if (withSound) playChime(withSound.sound, dir > 0 ? 7 : 0);
}

if (schoolCount > 1) {
  const prev = document.createElement("button");
  prev.className = "school-arrow prev";
  prev.textContent = "❮";
  prev.addEventListener("click", () => changeSchool(-1));
  const nextBtn = document.createElement("button");
  nextBtn.className = "school-arrow next";
  nextBtn.textContent = "❯";
  nextBtn.addEventListener("click", () => changeSchool(1));
  document.body.append(prev, nextBtn);

  schoolDots = document.createElement("div");
  schoolDots.className = "school-dots";
  for (let s = 0; s < schoolCount; s++) {
    const dot = document.createElement("button");
    dot.addEventListener("click", () => {
      if (s !== schoolIndex) changeSchool(s > schoolIndex ? 1 : -1);
    });
    schoolDots.appendChild(dot);
  }
  document.body.appendChild(schoolDots);
  updateDots();
}
setSchoolVisibility();

/* --- Sound: ambience + fish SFX, one master switch --------------
   Browsers block sound until the visitor interacts with the page,
   so the tank starts silent and the first click/drag (or the
   speaker button) turns everything on. The same button mutes both
   the music bed and the per-fish hover sounds. ------------------ */
let audio = null;
let soundOn = false;   // master switch — fish SFX check this too
const hasAnySfx = FISH.some((fish) => fish.sound);

if (SETTINGS.music || hasAnySfx) {
  if (SETTINGS.music) {
    audio = new Audio(SETTINGS.music);
    audio.loop = true;
    audio.volume = 0.5;
  }

  const soundBtn = document.createElement("button");
  soundBtn.className = "sound-btn";
  soundBtn.textContent = "🔇";
  soundBtn.title = "Turn sound on";
  soundBtn.setAttribute("aria-label", "Toggle sound");
  document.getElementById("topControls").appendChild(soundBtn);

  function setSound(on) {
    soundOn = on;
    if (audio) {
      if (on) audio.play().catch(() => {});
      else audio.pause();
    }
    soundBtn.textContent = on ? "🔊" : "🔇";
    soundBtn.title = on ? "Turn sound off" : "Turn sound on";
  }

  soundBtn.addEventListener("click", (e) => {
    e.stopPropagation();              // don't start a tank-drag
    setSound(!soundOn);
  });

  // Start the sound on the visitor's first interaction anywhere,
  // and warm up the chime engine so the first hover rings instantly
  window.addEventListener("pointerdown", function firstTap() {
    if (!soundOn) setSound(true);
    if (hasAnySfx) {
      initChimeEngine();
      const firstWithSound = FISH.find((f) => f.sound);
      if (firstWithSound) loadChime(firstWithSound.sound);
    }
    window.removeEventListener("pointerdown", firstTap);
  });
}

/* --- "Create your fish" button + pop-up ------------------------ */
let createBtn = null;
const createOverlay = document.getElementById("createOverlay");

if (SETTINGS.templateUrl || SETTINGS.submitUrl) {
  createBtn = document.createElement("button");
  createBtn.className = "create-btn";

  // The click sound, shared by the create button and everything
  // inside its menu — same volume as the fish SFX
  let pluck = null;
  function playPluck() {
    if (!SETTINGS.createSound || !soundOn) return;
    if (!pluck) { pluck = new Audio(SETTINGS.createSound); pluck.volume = 0.25; }
    pluck.currentTime = 0;
    pluck.play().catch(() => {});
  }

  createBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    playPluck();
    lastFocused = createBtn;
    createOverlay.classList.add("open");
  });
  document.body.appendChild(createBtn);

  // Wire the options; hide any whose URL isn't set
  const optDownload = document.getElementById("optDownload");
  const optSubmit = document.getElementById("optSubmit");
  const downloadOverlay = document.getElementById("downloadOverlay");

  // "Download the fish template" opens the format submenu
  if (SETTINGS.templateUrl || SETTINGS.templatePsd || SETTINGS.templateKrita) {
    optDownload.addEventListener("click", () => {
      lastFocused = optDownload;
      createOverlay.classList.remove("open");
      downloadOverlay.classList.add("open");
    });
  } else optDownload.style.display = "none";

  const submitOverlay = document.getElementById("submitOverlay");
  const submitFrame = document.getElementById("submitFrame");
  let submitFrameLoaded = false; // iframe.src reads back as a real URL even
                                  // when src="", so a plain boolean flag is
                                  // used here instead of checking .src itself
  if (SETTINGS.submitEmbedUrl) {
    optSubmit.addEventListener("click", () => {
      // Only point the iframe at the real form the first time it's
      // opened — no network request to monday.com until someone
      // actually asks to submit a fish.
      if (!submitFrameLoaded) {
        submitFrame.src = SETTINGS.submitEmbedUrl;
        submitFrameLoaded = true;
      }
      lastFocused = optSubmit;
      createOverlay.classList.remove("open");
      submitOverlay.classList.add("open");
    });
  } else optSubmit.style.display = "none";

  // Back returns to the create menu; backdrop click closes fully
  document.getElementById("submitBack").addEventListener("click", () => {
    submitOverlay.classList.remove("open");
    createOverlay.classList.add("open");
  });
  submitOverlay.addEventListener("click", (e) => {
    if (e.target === submitOverlay) submitOverlay.classList.remove("open");
  });

  // The three format buttons
  const dlPng = document.getElementById("dlPng");
  const dlPsd = document.getElementById("dlPsd");
  const dlKrita = document.getElementById("dlKrita");
  if (SETTINGS.templateUrl) {
    dlPng.href = SETTINGS.templateUrl;
    dlPng.download = "Feeling-Fishy-Template.png";
  } else dlPng.style.display = "none";
  if (SETTINGS.templatePsd) dlPsd.href = SETTINGS.templatePsd;
  else dlPsd.style.display = "none";
  if (SETTINGS.templateKrita) dlKrita.href = SETTINGS.templateKrita;
  else dlKrita.style.display = "none";

  // Back returns to the create menu
  document.getElementById("downloadBack").addEventListener("click", () => {
    downloadOverlay.classList.remove("open");
    createOverlay.classList.add("open");
  });
  // Clicking the dark backdrop closes the submenu
  downloadOverlay.addEventListener("click", (e) => {
    if (e.target === downloadOverlay) downloadOverlay.classList.remove("open");
  });

  // Your inlay artwork: an <img> placed above the text label
  // inside each button's window (real alt text, not a CSS
  // background — keeps this accessible to screen readers).
  const inlayTargets = {
    download: "optDownload", submit: "optSubmit",
    png: "dlPng", psd: "dlPsd", krita: "dlKrita",
  };
  for (const [key, id] of Object.entries(inlayTargets)) {
    const src = (SETTINGS.buttonInlays || {})[key];
    if (!src) continue;
    const inlay = document.querySelector("#" + id + " .inlay");
    const img = document.createElement("img");
    img.src = src;
    img.alt = "";                 // decorative; the text label beside it already says it
    inlay.prepend(img);
  }

  // Every button in the menus plays the same click sound
  [optDownload, optSubmit, dlPng, dlPsd, dlKrita,
   document.getElementById("createClose"),
   document.getElementById("downloadBack"),
   document.getElementById("submitBack")]
    .forEach((btn) => btn.addEventListener("click", playPluck));
}

function closeCreate() { createOverlay.classList.remove("open"); }
createOverlay.addEventListener("click", (e) => {
  if (e.target === createOverlay) closeCreate();
});

/* --- Feed the Fish button ------------------------------------------
   A plain fun button — no link, no donation page. Clicking it just
   drops food in and sends the school into a happy feeding frenzy. --- */
let feedUntil = 0;      // performance.now() timestamp the frenzy ends
let feedLift = 0;       // how far the school has risen toward the food
let feedSpin = 1;       // carousel speed multiplier, eases up to 10x
let feedingState = false;

const donateBtn = document.createElement("button");
donateBtn.type = "button";
donateBtn.className = "donate-btn";
donateBtn.addEventListener("click", feedTheFish);
document.getElementById("topControls").appendChild(donateBtn);

function feedTheFish() {
  feedUntil = performance.now() + 5000;   // 5 seconds of frenzy
  for (let i = 0; i < 22; i++) {
    setTimeout(() => {
      const p = document.createElement("div");
      p.className = "pellet";
      const size = 5 + Math.random() * 5;
      p.style.width = p.style.height = size + "px";
      p.style.left = (8 + Math.random() * 84) + "%";
      p.style.animationDuration = (3 + Math.random() * 2.5) + "s";
      // Some pellets sink behind the fish, some in front
      p.style.zIndex = Math.random() < 0.6 ? 6 : 320;
      tank.appendChild(p);
      p.addEventListener("animationend", () => p.remove());
    }, i * 130);
  }
}

/* --- Logo (top right), linked back to the Spectrum Public Access homepage */
if (SETTINGS.logo) {
  const logoLink = document.createElement("a");
  logoLink.className = "logo-link";
  logoLink.href = "/";
  logoLink.setAttribute("aria-label", "Back to Spectrum Public Access home");
  const logo = document.createElement("img");
  logo.className = "logo";
  logo.src = SETTINGS.logo;
  logo.alt = "Spectrum Public Access";
  logoLink.appendChild(logo);
  document.body.appendChild(logoLink);
}

/* --- Info button + "About this project" pop-up -----------------
   A short project blurb plus a plain-language walkthrough of what
   every button on the page does. Always shown — this isn't tied to
   any optional URL setting the way Create/Donate are. ------------ */
const infoBtn = document.createElement("button");
infoBtn.className = "info-btn";
infoBtn.textContent = "i";
document.getElementById("topControls").appendChild(infoBtn);

const infoOverlay = document.getElementById("infoOverlay");
let lastFocused = null; // remembers what to return focus to on close

function openOverlay(overlay, trigger) {
  lastFocused = trigger || document.activeElement;
  overlay.classList.add("open");
  // Move focus into the dialog for keyboard/screen-reader users
  const heading = overlay.querySelector("h2");
  if (heading) { heading.setAttribute("tabindex", "-1"); heading.focus(); }
}
function closeOverlay(overlay) {
  overlay.classList.remove("open");
  if (lastFocused && lastFocused.focus) lastFocused.focus();
}

infoBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  openOverlay(infoOverlay, infoBtn);
});
document.getElementById("infoClose").addEventListener("click", () => closeOverlay(infoOverlay));
infoOverlay.addEventListener("click", (e) => { if (e.target === infoOverlay) closeOverlay(infoOverlay); });

// Escape closes whichever pop-up is currently open, from anywhere
window.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  const open = document.querySelector(".card-overlay.open");
  if (open) closeOverlay(open);
});

/* --- Language system --------------------------------------------
   All wording lives in the TEXT table at the top of the file.
   applyLanguage() rewrites every phrase on screen at once. ------- */
let lang = SETTINGS.language || "en";
const langBtn = document.createElement("button");
langBtn.className = "lang-btn";
document.getElementById("topControls").appendChild(langBtn);

function applyLanguage() {
  const t = TEXT[lang];
  document.documentElement.lang = lang;
  document.getElementById("tagline").textContent = t.tagline;
  document.getElementById("cardBack").textContent = t.back;
  document.getElementById("createTitle").textContent = t.createTitle;
  document.getElementById("optDownloadLabel").textContent = t.download;
  document.getElementById("optSubmitLabel").textContent = t.submit;
  document.getElementById("downloadTitle").textContent = t.downloadTitle;
  document.getElementById("dlPngLabel").textContent = t.asIs;
  document.getElementById("dlPsdLabel").textContent = t.psd;
  document.getElementById("dlKritaLabel").textContent = t.krita;
  document.getElementById("downloadNote").textContent = t.downloadNote;
  document.getElementById("downloadBack").textContent = t.goBack;
  document.getElementById("createClose").textContent = t.close;
  document.getElementById("submitTitle").textContent = t.submitTitle;
  document.getElementById("submitFrame").title = t.submitFrameTitle;
  document.getElementById("submitBack").textContent = t.goBack;
  if (createBtn) createBtn.textContent = t.create;
  if (donateBtn) donateBtn.textContent = t.donate;
  // Info button + "About this project" pop-up
  infoBtn.title = t.info;
  infoBtn.setAttribute("aria-label", t.info);
  document.getElementById("infoTitle").textContent = t.infoTitle;
  document.getElementById("infoIntro").textContent = t.infoIntro;
  document.getElementById("howToTitle").textContent = t.howToTitle;
  document.getElementById("infoClose").textContent = t.close;
  const howToList = document.getElementById("howToList");
  howToList.innerHTML = "";
  t.howTo.forEach((step) => {
    const li = document.createElement("li");
    li.textContent = step;
    howToList.appendChild(li);
  });
  document.querySelectorAll(".school-arrow.prev").forEach((b) => {
    b.title = t.prevSchool; b.setAttribute("aria-label", t.prevSchool);
  });
  document.querySelectorAll(".school-arrow.next").forEach((b) => {
    b.title = t.nextSchool; b.setAttribute("aria-label", t.nextSchool);
  });
  // Update every fish's name tag ("by" / "par")
  document.querySelectorAll(".fish .name-tag").forEach((tag, i) => {
    tag.textContent = t.by + " " + FISH[i].creator;
  });
  // The button shows the language you'd switch TO
  langBtn.textContent = lang === "en" ? "FR" : "EN";
}

langBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  lang = lang === "en" ? "fr" : "en";
  applyLanguage();
});
applyLanguage();

/* --- Drag to rotate -------------------------------------------- */
let rotation = 0;
let dragVelocity = 0;
let isDragging = false;
let wasDragged = false;
let lastPointerX = 0;

/* Drag sound: the water "grabs" while you hold, and lets go when
   you do. preservesPitch is turned off so changing playbackRate
   bends the pitch — dragging fast scrubs the sound higher, like a
   record scratch, but underwater. Quick fades avoid pops. */
let dragAudio = null;
let dragFade = null;

function startDragSound() {
  if (!SETTINGS.dragSound || !soundOn) return;
  if (!dragAudio) {
    dragAudio = new Audio(SETTINGS.dragSound);
    dragAudio.loop = true;
    dragAudio.preservesPitch = false;
    dragAudio.webkitPreservesPitch = false;
  }
  clearInterval(dragFade);
  dragAudio.volume = 0;
  dragAudio.playbackRate = 1;
  dragAudio.currentTime = 0;
  dragAudio.play().catch(() => {});
  dragFade = setInterval(() => {          // fade in (~100ms)
    dragAudio.volume = Math.min(0.25, dragAudio.volume + 0.05);
    if (dragAudio.volume >= 0.25) clearInterval(dragFade);
  }, 20);
}

function stopDragSound() {
  if (!dragAudio) return;
  clearInterval(dragFade);
  dragFade = setInterval(() => {          // fade out (~150ms)
    dragAudio.volume = Math.max(0, dragAudio.volume - 0.04);
    if (dragAudio.volume <= 0) { dragAudio.pause(); clearInterval(dragFade); }
  }, 20);
}

window.addEventListener("pointerdown", (e) => {
  if (e.target.closest(".create-btn, .donate-btn, .sound-btn, .lang-btn, .info-btn, .school-arrow, .school-dots, .card")) return;
  isDragging = true;
  wasDragged = false;
  lastPointerX = e.clientX;
  document.body.classList.add("dragging");
  startDragSound();
});
window.addEventListener("pointermove", (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastPointerX;
  lastPointerX = e.clientX;
  if (Math.abs(dx) > 2) wasDragged = true;
  rotation += dx * 0.004;
  dragVelocity = dx * 0.004;

  // The scratch: drag speed bends the sound's pitch (0.8x–1.6x).
  // Delete these three lines for a steady, un-bent drag sound.
  if (dragAudio && !dragAudio.paused) {
    dragAudio.playbackRate = 0.8 + Math.min(Math.abs(dx) / 12, 1) * 0.8;
  }
});
window.addEventListener("pointerup", () => {
  if (isDragging) stopDragSound();
  isDragging = false;
  document.body.classList.remove("dragging");
});

/* --- Calm mode ---------------------------------------------------
   After 3 seconds without any input, the interface fades away and
   the visitor is left with just the fish and the water. The first
   twitch of the mouse (or any key/touch) brings everything back.
   The UI never hides mid-drag or while a pop-up is open. --------- */
let calmTimer = null;

function scheduleCalm() {
  clearTimeout(calmTimer);
  calmTimer = setTimeout(() => {
    if (isDragging || document.querySelector(".card-overlay.open")) {
      scheduleCalm();          // busy — check again in a few seconds
      return;
    }
    document.body.classList.add("calm");
  }, 3000);
}

function wakeUI() {
  document.body.classList.remove("calm");
  scheduleCalm();
}

["pointermove", "pointerdown", "keydown", "wheel", "touchstart"]
  .forEach((ev) => window.addEventListener(ev, wakeUI, { passive: true }));
scheduleCalm();

/* --- The orbit engine: runs ~60 frames per second --------------
   Each fish sits at an angle on an invisible carousel:
     x = cos(angle) → left/right position
     z = sin(angle) → depth: -1 back … +1 front
   Depth drives scale, opacity, blur, and stacking order — that's
   what creates the 3D feeling on a flat screen. ----------------- */
const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
let lastTime = performance.now();

function animate(now) {
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  // Feeding time? The carousel whips into a feeding frenzy: the
  // spin eases up to 20x speed and back down when the food is gone
  const feeding = now < feedUntil;
  if (feeding !== feedingState) {
    feedingState = feeding;
    document.body.classList.toggle("feeding", feeding);
  }
  feedLift += ((feeding ? 45 : 0) - feedLift) * Math.min(1, dt * 2.5);
  feedSpin += ((feeding ? 20 : 1) - feedSpin) * Math.min(1, dt * 2);

  // School transition: ease the leaving school off one side, then
  // ease the arriving school in from the other (500ms each phase)
  if (schoolAnim) {
    const p = Math.min(1, (now - schoolAnim.start) / 500);
    if (schoolAnim.phase === "out") {
      schoolOffset = -schoolAnim.dir * window.innerWidth * 1.2 * (p * p);
      if (p >= 1) {
        schoolIndex = schoolAnim.next;
        setSchoolVisibility();
        updateDots();
        schoolAnim.phase = "in";
        schoolAnim.start = now;
      }
    } else {
      const q = 1 - Math.pow(1 - p, 3);   // decelerate into place
      schoolOffset = schoolAnim.dir * window.innerWidth * 1.2 * (1 - q);
      if (p >= 1) { schoolAnim = null; schoolOffset = 0; }
    }
  }

  if (!isDragging && !reduceMotion) {
    rotation += ORBIT.speed * dt * feedSpin;
  }
  if (!isDragging) {
    rotation += dragVelocity;
    dragVelocity *= 0.95;   // drag momentum fades out
  }

  const cx = window.innerWidth / 2;
  const orbitRadius = window.innerWidth * ORBIT.radiusX;

  for (const fish of swimmers) {
    if (!fish.active) continue;   // fish in other schools sit this out

    const a = fish.angle + rotation;
    const x = Math.cos(a);
    const z = Math.sin(a);

    const scale   = mapRange(z, -1, 1, ORBIT.farScale, ORBIT.nearScale);
    const opacity = mapRange(z, -1, 1, ORBIT.farOpacity, 1);
    const blur    = mapRange(z, -1, 1, ORBIT.farBlur, 0);
    const bob = reduceMotion ? 0
      : Math.sin(now / 1000 + fish.bobOffset)
        * ORBIT.bobAmount * (feeding ? 2 : 1);

    // Motion blur: a fish's sideways speed on the carousel is
    // highest at the sides (|z| near 1) and zero at front/back
    // dead-center. Blur scales with spin speed × that velocity.
    const motionBlur = reduceMotion ? 0
      : (feedSpin - 1) * Math.abs(z) * 0.45;

    const screenX = cx + x * orbitRadius * fish.radiusJitter + schoolOffset;
    const screenY = window.innerHeight * (fish.height / 100) + bob - feedLift;

    // Fish face where they're going; art is drawn facing left, so
    // the flip wrapper mirrors it on the back half of the carousel
    // (only the artwork — tags and thought bubbles stay readable).
    const facing = z < 0 ? -1 : 1;
    if ((facing < 0) !== fish.flipped) {
      fish.flipped = facing < 0;
      fish.flipEl.style.transform = `scaleX(${facing})`;
      fish.el.classList.toggle("flipped", fish.flipped);
    }

    fish.el.style.width = fish.size + "px";
    fish.el.style.transform =
      `translate(${screenX - fish.size / 2}px, ${screenY}px) scale(${scale})`;
    fish.el.style.opacity = fish.hovered ? 1 : opacity;
    // Hovered fish un-blur so the name tag and bubble stay crisp
    const totalBlur = (fish.hovered ? 0 : blur) + motionBlur;
    fish.el.style.filter =
      totalBlur > 0.15 ? `blur(${totalBlur}px)` : "none";
    fish.el.style.zIndex = fish.hovered
      ? 500
      : Math.round(mapRange(z, -1, 1, 10, 300));
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* --- Detail card + the flight transition ------------------------
   Clicking a fish doesn't just open the card — the fish visibly
   leaves the school and swims up to it:
   1. Measure where the fish is on screen right now
   2. Open the card with its image slot invisible, measure where
      the image WILL be
   3. Hide the real fish, place a flying copy at position 1, and
      let CSS transition it to position 2 (wiggling all the way)
   4. When it lands: show the card image, remove the flying copy
   The card's text fades up underneath meanwhile (.reveal class). */
const overlay = document.getElementById("cardOverlay");
const cardEl = overlay.querySelector(".card");
let openFishIndex = null;

function openCard(index) {
  const fish = FISH[index];

  // Fill in the card's content
  const cardArt = document.getElementById("cardArt");
  cardArt.innerHTML = "";
  const cardImg = document.createElement("img");
  cardImg.src = fish.image;
  cardImg.alt = fish.name;
  cardImg.onerror = () => { cardImg.style.display = "none"; };
  cardArt.appendChild(cardImg);
  document.getElementById("cardName").textContent = fish.name;
  document.getElementById("cardCreator").textContent =
    TEXT[lang].designedBy + " " + fish.creator;
  const bioEl = document.getElementById("cardBio");
  bioEl.textContent = fish.bio || "";
  bioEl.style.display = fish.bio ? "block" : "none";

  // Reduced motion (or a missing image): open the card plainly
  if (stillMotion || !fish.image) {
    overlay.classList.add("open");
    return;
  }

  // 1. Where is the fish right now?
  const sourceEl = swimmers[index].el;
  const start = sourceEl.getBoundingClientRect();

  // 2. Open the card, but keep its image invisible for now
  cardImg.style.opacity = "0";
  cardEl.classList.add("reveal");
  overlay.classList.add("open");

  requestAnimationFrame(() => {
    const target = cardImg.getBoundingClientRect();

    // 3. The flying copy, starting exactly where the fish was
    const clone = document.createElement("div");
    clone.className = "flight";
    clone.style.left = start.left + "px";
    clone.style.top = start.top + "px";
    clone.style.width = start.width + "px";
    clone.style.height = start.height + "px";
    clone.innerHTML =
      `<div class="flight-wiggle"><img src="${fish.image}" alt=""></div>`;
    document.body.appendChild(clone);

    sourceEl.style.visibility = "hidden";   // its spot in the school empties
    openFishIndex = index;

    // Next frame, give it its destination — CSS animates the trip
    requestAnimationFrame(() => {
      clone.style.left = target.left + "px";
      clone.style.top = target.top + "px";
      clone.style.width = target.width + "px";
      clone.style.height = target.height + "px";
    });

    // 4. Touchdown: swap the flying copy for the card's own image
    const land = () => {
      cardImg.style.opacity = "";
      clone.remove();
    };
    clone.addEventListener("transitionend", land, { once: true });
    setTimeout(land, 700);   // safety net if transitionend never fires
  });
}

function closeCard() {
  overlay.classList.remove("open");
  cardEl.classList.remove("reveal");
  // The fish rejoins the school
  if (openFishIndex !== null) {
    swimmers[openFishIndex].el.style.visibility = "";
    openFishIndex = null;
  }
  document.querySelectorAll(".flight").forEach((f) => f.remove());
}
overlay.addEventListener("click", (e) => { if (e.target === overlay) closeCard(); });
</script>
